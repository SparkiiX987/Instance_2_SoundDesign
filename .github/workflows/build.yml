name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  UNITY_VERSION: 6000.3.10f1
  PROJECT_NAME: Instance_2_SoundDesign

jobs:
  # ──────────────────────────────────────────────
  # Build matrix: Windows64 & Linux64 en parallèle
  # ──────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneLinux64
          - targetPlatform: StandaloneWindows64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build ${{ matrix.targetPlatform }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:   ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ matrix.targetPlatform }}
          buildsPath:     build

      - name: Zip build
        run: |
          cd build
          zip -r ../${{ env.PROJECT_NAME }}-${{ matrix.targetPlatform }}.zip ${{ matrix.targetPlatform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.targetPlatform }}
          path: ${{ env.PROJECT_NAME }}-${{ matrix.targetPlatform }}.zip
          retention-days: 7

  # ──────────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-StandaloneWindows64
          alias: windows-build
          path: artifacts/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-StandaloneLinux64
          alias: linux-build
          path: artifacts/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ github.sha }})"
          body: |
            Automated build from commit ${{ github.sha }} on branch `main`.
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
