name: Get Unity License (.alf)

# Workflow one-shot : à lancer UNE SEULE FOIS pour obtenir le .alf
# Étapes après avoir lancé ce workflow :
#   1. Télécharge l'artifact "Unity_vXXXX.alf" depuis la page du run
#   2. Va sur https://license.unity3d.com/manual
#   3. Upload le .alf → télécharge le .ulf
#   4. Copie le contenu du .ulf dans le secret GitHub : UNITY_LICENSE
#   5. Ce workflow ne sera plus jamais nécessaire

on:
  workflow_dispatch:

env:
  UNITY_VERSION: 6000.3.10f1

jobs:
  get-license:
    name: Generate .alf activation file
    runs-on: ubuntu-latest
    steps:
      - name: Generate Unity activation file (.alf)
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: ${{ env.UNITY_VERSION }}

      - name: Upload .alf as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v${{ env.UNITY_VERSION }}.alf
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 1

